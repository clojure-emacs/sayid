version: 2.1

# Default settings shared by all executors.
defaults: &defaults
  working_directory: ~/sayid
  environment:
    # Limit the maximum heap size to prevent out of memory errors and
    # print stacktraces straight to the console.
    JVM_OPTS: >
      -Xmx3200m
      -Dclojure.main.report=stderr

# Runners for the supported OpenJDK versions, using the official Clojure
# images (https://hub.docker.com/_/clojure).
executors:
  jdk8:
    docker:
      - image: clojure:temurin-8-lein-2.12.0-noble
    <<: *defaults
  jdk11:
    docker:
      - image: clojure:temurin-11-lein-2.12.0-noble
    <<: *defaults
  jdk17:
    docker:
      - image: clojure:temurin-17-lein-2.12.0-noble
    <<: *defaults
  jdk21:
    docker:
      - image: clojure:temurin-21-lein-2.12.0-noble
    <<: *defaults

commands:
  with_cache:
    description: |
      Run steps with the Maven dependency cache restored and saved. The cache
      key is derived from the contents of project.clj.
    parameters:
      steps:
        type: steps
      cache_version:
        type: string
        default: "1"
    steps:
      - run:
          name: Generate cache checksum
          command: |
            shasum project.clj | awk '{print $1}' > /tmp/clojure_cache_seed
      - restore_cache:
          key: deps-<< parameters.cache_version >>-{{ checksum "/tmp/clojure_cache_seed" }}
      - steps: << parameters.steps >>
      - save_cache:
          paths:
            - ~/.m2
          key: deps-<< parameters.cache_version >>-{{ checksum "/tmp/clojure_cache_seed" }}

jobs:
  test:
    description: Run the test suite against a given JDK and Clojure version.
    parameters:
      jdk_version:
        type: string
      clojure_version:
        type: string
    executor: << parameters.jdk_version >>
    steps:
      - checkout
      - with_cache:
          steps:
            - run:
                name: Run tests (Clojure << parameters.clojure_version >>)
                command: lein with-profile +<< parameters.clojure_version >> test

run_always: &run_always
  filters:
    branches:
      only: /.*/
    tags:
      only: /.*/

workflows:
  build:
    jobs:
      # Every supported Clojure version on the latest LTS JDK.
      - test:
          name: test-clojure-<< matrix.clojure_version >>-<< matrix.jdk_version >>
          matrix:
            parameters:
              clojure_version: ["1.10", "1.11", "1.12"]
              jdk_version: [jdk21]
          <<: *run_always
      # Latest Clojure across the JDK range we support.
      - test:
          name: test-jdk-<< matrix.jdk_version >>-<< matrix.clojure_version >>
          matrix:
            parameters:
              clojure_version: ["1.12"]
              jdk_version: [jdk8, jdk11, jdk17]
          <<: *run_always
